<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Jenkins - Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            background: white;
            padding: 30px;
            border-radius: 10px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            color: #667eea;
            font-size: 32px;
        }

        .status-badge {
            background: #10b981;
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-card h3 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-card .number {
            font-size: 36px;
            font-weight: bold;
            color: #333;
        }

        .stat-card .percentage {
            color: #10b981;
            font-size: 14px;
            margin-top: 10px;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        @media (max-width: 1024px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }

        .panel {
            background: white;
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .panel h2 {
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #667eea;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 500;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-family: inherit;
            font-size: 14px;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s ease;
            font-size: 14px;
        }

        button:hover {
            background: #5568d3;
        }

        button:active {
            transform: scale(0.98);
        }

        .button-group {
            display: flex;
            gap: 10px;
        }

        .button-group button {
            flex: 1;
        }

        .button-secondary {
            background: #6b7280;
        }

        .button-secondary:hover {
            background: #4b5563;
        }

        .button-danger {
            background: #ef4444;
        }

        .button-danger:hover {
            background: #dc2626;
        }

        .list-item {
            background: #f9fafb;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 10px;
            border-left: 4px solid #667eea;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .list-item:hover {
            background: #f3f4f6;
        }

        .list-item-info h3 {
            color: #333;
            margin-bottom: 5px;
            font-size: 16px;
        }

        .list-item-info p {
            color: #6b7280;
            font-size: 13px;
        }

        .list-item-actions {
            display: flex;
            gap: 10px;
        }

        .list-item-actions button {
            padding: 8px 16px;
            font-size: 12px;
        }

        .status-badge-small {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            margin-top: 5px;
        }

        .status-success {
            background: #d1fae5;
            color: #065f46;
        }

        .status-failed {
            background: #fee2e2;
            color: #7f1d1d;
        }

        .status-idle {
            background: #dbeafe;
            color: #1e40af;
        }

        .status-running {
            background: #fef3c7;
            color: #92400e;
        }

        .builds-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .build-item {
            background: #f9fafb;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 10px;
            border-left: 4px solid #667eea;
        }

        .build-item h4 {
            color: #333;
            margin-bottom: 8px;
        }

        .build-meta {
            font-size: 12px;
            color: #6b7280;
            margin-bottom: 8px;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #6b7280;
        }

        .error-message {
            background: #fee2e2;
            color: #7f1d1d;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 15px;
            border-left: 4px solid #ef4444;
        }

        .success-message {
            background: #d1fae5;
            color: #065f46;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 15px;
            border-left: 4px solid #10b981;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #6b7280;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .refresh-button {
            background: #6b7280;
            padding: 8px 16px;
            font-size: 12px;
        }

        .refreshing {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .full-width {
            grid-column: 1 / -1;
        }

        .step-item {
            background: #f9fafb;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 8px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            border-left: 3px solid #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div>
                <h1>🚀 Mini Jenkins</h1>
                <p style="color: #6b7280; margin-top: 5px;">CI/CD Pipeline Dashboard</p>
            </div>
            <div class="status-badge" id="statusBadge">● Connected</div>
        </header>

        <div id="messageContainer"></div>

        <div class="stats-grid" id="statsContainer">
            <div class="loading">Loading statistics...</div>
        </div>

        <div class="main-grid">
            <!-- Create Job Panel -->
            <div class="panel">
                <h2>➕ Create Job</h2>
                <div class="form-group">
                    <label>Job Name</label>
                    <input type="text" id="jobName" placeholder="e.g., Build App">
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="jobDescription" placeholder="e.g., Compile and test the application"></textarea>
                </div>
                <button onclick="createJob()">Create Job</button>
            </div>

            <!-- Jobs List Panel -->
            <div class="panel">
                <h2>📋 Jobs</h2>
                <button class="refresh-button" onclick="loadJobs()">🔄 Refresh</button>
                <div id="jobsList" style="margin-top: 15px;"></div>
            </div>
        </div>

        <div class="main-grid">
            <!-- Add Step to Job -->
            <div class="panel">
                <h2>➕ Add Build Step</h2>
                <div class="form-group">
                    <label>Select Job</label>
                    <select id="jobSelect" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; font-family: inherit;">
                        <option value="">Choose a job...</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Command</label>
                    <input type="text" id="stepCommand" placeholder="e.g., echo 'Building...'">
                </div>
                <button onclick="addStep()">Add Step</button>
            </div>

            <!-- Recent Builds -->
            <div class="panel">
                <h2>📊 Recent Builds</h2>
                <div class="builds-list" id="buildsList"></div>
            </div>
        </div>

        <!-- Full Width Sections -->
        <div class="panel full-width">
            <h2>🔧 Quick Actions</h2>
            <div class="button-group" style="gap: 15px; flex-wrap: wrap;">
                <button onclick="loadJobs()">Reload Jobs</button>
                <button onclick="loadStats()">Refresh Stats</button>
                <button onclick="loadBuilds()">Refresh Builds</button>
                <button class="button-secondary" onclick="testAPI()">Test API</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:5000';

        // Initialize dashboard
        function init() {
            loadStats();
            loadJobs();
            loadBuilds();
            setInterval(loadStats, 10000); // Refresh stats every 10 seconds
            setInterval(loadBuilds, 10000); // Refresh builds every 10 seconds
        }

        // Show message
        function showMessage(message, type = 'success') {
            const container = document.getElementById('messageContainer');
            const className = type === 'success' ? 'success-message' : 'error-message';
            const icon = type === 'success' ? '✓' : '✗';
            container.innerHTML = `<div class="${className}">${icon} ${message}</div>`;
            setTimeout(() => {
                container.innerHTML = '';
            }, 5000);
        }

        // Load statistics
        async function loadStats() {
            try {
                const response = await fetch(`${API_BASE}/api/stats`);
                const data = await response.json();
                
                const jobs = data.jobs;
                const html = `
                    <div class="stat-card">
                        <h3>Total Jobs</h3>
                        <div class="number">${jobs.total_jobs}</div>
                    </div>
                    <div class="stat-card">
                        <h3>Total Builds</h3>
                        <div class="number">${jobs.total_builds}</div>
                    </div>
                    <div class="stat-card">
                        <h3>Successful Builds</h3>
                        <div class="number">${jobs.successful_builds}</div>
                        <div class="percentage">${jobs.success_rate.toFixed(1)}% success rate</div>
                    </div>
                    <div class="stat-card">
                        <h3>Failed Builds</h3>
                        <div class="number">${jobs.failed_builds}</div>
                    </div>
                `;
                document.getElementById('statsContainer').innerHTML = html;
                updateStatus(true);
            } catch (error) {
                console.error('Error loading stats:', error);
                updateStatus(false);
            }
        }

        // Load jobs
        async function loadJobs() {
            try {
                const response = await fetch(`${API_BASE}/api/jobs`);
                const data = await response.json();
                
                const jobsList = document.getElementById('jobsList');
                const jobSelect = document.getElementById('jobSelect');
                
                if (data.jobs.length === 0) {
                    jobsList.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📭</div>No jobs yet</div>';
                    jobSelect.innerHTML = '<option value="">Choose a job...</option>';
                    return;
                }

                let html = '';
                let selectOptions = '<option value="">Choose a job...</option>';
                
                for (const job of data.jobs) {
                    const statusClass = `status-${job.status}`;
                    html += `
                        <div class="list-item">
                            <div class="list-item-info">
                                <h3>${job.name}</h3>
                                <p>${job.description || 'No description'}</p>
                                <span class="status-badge-small ${statusClass}">${job.status.toUpperCase()}</span>
                                <p style="margin-top: 5px; font-size: 12px;">Builds: ${job.build_count} | Last run: ${job.last_run ? new Date(job.last_run).toLocaleString() : 'Never'}</p>
                            </div>
                            <div class="list-item-actions">
                                <button onclick="runJob('${job.job_id}')">Run</button>
                                <button class="button-secondary" onclick="viewJobHistory('${job.job_id}')">History</button>
                                <button class="button-danger" onclick="deleteJob('${job.job_id}')">Delete</button>
                            </div>
                        </div>
                    `;
                    selectOptions += `<option value="${job.job_id}">${job.name}</option>`;
                }
                
                jobsList.innerHTML = html;
                jobSelect.innerHTML = selectOptions;
                updateStatus(true);
            } catch (error) {
                console.error('Error loading jobs:', error);
                document.getElementById('jobsList').innerHTML = `<div class="error-message">Failed to load jobs</div>`;
                updateStatus(false);
            }
        }

        // Create job
        async function createJob() {
            const name = document.getElementById('jobName').value;
            const description = document.getElementById('jobDescription').value;

            if (!name) {
                showMessage('Please enter a job name', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/api/jobs`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, description })
                });

                if (response.ok) {
                    showMessage('Job created successfully!');
                    document.getElementById('jobName').value = '';
                    document.getElementById('jobDescription').value = '';
                    loadJobs();
                } else {
                    showMessage('Failed to create job', 'error');
                }
            } catch (error) {
                showMessage('Error: ' + error.message, 'error');
            }
        }

        // Add step
        async function addStep() {
            const jobId = document.getElementById('jobSelect').value;
            const command = document.getElementById('stepCommand').value;

            if (!jobId) {
                showMessage('Please select a job', 'error');
                return;
            }

            if (!command) {
                showMessage('Please enter a command', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/api/jobs/${jobId}/steps`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ command })
                });

                if (response.ok) {
                    showMessage('Step added successfully!');
                    document.getElementById('stepCommand').value = '';
                    loadJobs();
                } else {
                    showMessage('Failed to add step', 'error');
                }
            } catch (error) {
                showMessage('Error: ' + error.message, 'error');
            }
        }

        // Run job
        async function runJob(jobId) {
            try {
                const response = await fetch(`${API_BASE}/api/jobs/${jobId}/run`, {
                    method: 'POST'
                });

                const data = await response.json();
                
                if (response.ok) {
                    showMessage(`Build completed! Status: ${data.result.status}`);
                    loadStats();
                    loadJobs();
                    loadBuilds();
                } else {
                    showMessage('Failed to run job', 'error');
                }
            } catch (error) {
                showMessage('Error: ' + error.message, 'error');
            }
        }

        // Delete job
        async function deleteJob(jobId) {
            if (!confirm('Are you sure you want to delete this job?')) return;

            try {
                const response = await fetch(`${API_BASE}/api/jobs/${jobId}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    showMessage('Job deleted successfully!');
                    loadJobs();
                } else {
                    showMessage('Failed to delete job', 'error');
                }
            } catch (error) {
                showMessage('Error: ' + error.message, 'error');
            }
        }

        // Load recent builds
        async function loadBuilds() {
            try {
                const response = await fetch(`${API_BASE}/api/dashboard`);
                const data = await response.json();
                
                const buildsList = document.getElementById('buildsList');
                
                if (data.recent_builds.length === 0) {
                    buildsList.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📭</div>No builds yet</div>';
                    return;
                }

                let html = '';
                for (const build of data.recent_builds) {
                    const statusClass = `status-${build.status}`;
                    const icon = build.status === 'success' ? '✓' : '✗';
                    html += `
                        <div class="build-item">
                            <h4>${icon} ${build.job_name}</h4>
                            <div class="build-meta">
                                <span class="status-badge-small ${statusClass}">${build.status.toUpperCase()}</span>
                                • Duration: ${build.duration_seconds.toFixed(2)}s
                                • ${new Date(build.end_time).toLocaleString()}
                            </div>
                        </div>
                    `;
                }
                buildsList.innerHTML = html;
            } catch (error) {
                console.error('Error loading builds:', error);
            }
        }

        // View job history (simplified)
        function viewJobHistory(jobId) {
            alert('Job ID: ' + jobId + '\n\nView full history via API:\nGET /api/jobs/' + jobId + '/history');
        }

        // Test API
        async function testAPI() {
            try {
                const response = await fetch(`${API_BASE}/api/health`);
                const data = await response.json();
                showMessage('API is healthy: ' + data.message);
            } catch (error) {
                showMessage('API is not responding', 'error');
            }
        }

        // Update status
        function updateStatus(connected) {
            const badge = document.getElementById('statusBadge');
            if (connected) {
                badge.innerHTML = '● Connected';
                badge.style.background = '#10b981';
            } else {
                badge.innerHTML = '● Disconnected';
                badge.style.background = '#ef4444';
            }
        }

        // Initialize on load
        window.addEventListener('load', init);
    </script>
</body>
</html>
